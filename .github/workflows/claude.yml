name: Claude Code Review

# PR / Issue のコメント（およびレビューコメント）に「@claude ～」と書かれたら
# Claude が差分を読んでレビュー・修正提案してくれる体制。
#
# 前提（1回だけ設定）:
#   1. https://github.com/apps/claude を本リポジトリにインストール
#   2. Settings → Secrets and variables → Actions に
#      ANTHROPIC_API_KEY を追加（console.anthropic.com で発行した sk-ant-api03-... を貼る）
#
# 使い方:
#   - PR に「@claude このハンドル正規化の変更、他に見落としありそう？」のようにコメント
#   - コード行へのレビューコメントでも「@claude ここ指摘して」で呼び出せる
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # 無関係なコメントで毎回起動しないよう、@claude を含む場合に限定
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
